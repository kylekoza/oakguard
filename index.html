<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAKGUARD — Squirrel Tower Defense</title>
<style>
  :root{
    --bg0:#141b12; --bg1:#1d2916; --panel:#22301aee; --panel2:#2c3d22;
    --gold:#ffc94d; --gold2:#ffaa2b; --leaf:#8bc34a; --leaf2:#5a8f29;
    --bark:#8a5a33; --cream:#f5e9d0; --red:#e5533d; --blue:#5ab4e5;
    --common:#9ccb6a; --rare:#5ab4e5; --epic:#c77dff;
    --shadow:0 8px 32px #000a;
  }
  *{box-sizing:border-box; margin:0; padding:0; user-select:none; -webkit-user-select:none;}
  html,body{height:100%; background:radial-gradient(1200px 800px at 50% 20%, #24331b, #0d120a); overflow:hidden;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif; color:var(--cream);}
  #app{height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden;}
  #game-wrap{position:relative; width:960px; height:600px; flex:0 0 auto; transform-origin:center center;
    border-radius:18px; overflow:hidden; box-shadow:var(--shadow), 0 0 0 3px #00000055, 0 0 80px #4a7a2022;}
  canvas#game{position:absolute; inset:0; width:100%; height:100%; display:block; background:#2a3d1e;}

  /* ---------- HUD ---------- */
  .hud{position:absolute; pointer-events:none; z-index:5;}
  #topbar{top:0; left:0; right:0; display:flex; align-items:center; gap:8px; padding:7px 12px;
    background:linear-gradient(180deg,#101708ee, #10170800); font-size:14px;}
  .pill{pointer-events:auto; display:flex; align-items:center; gap:5px; background:#00000066; border:1px solid #ffffff1c;
    border-radius:999px; padding:4px 11px; font-weight:700; backdrop-filter:blur(4px); white-space:nowrap;}
  .pill .ico{font-size:15px;}
  #goldPill{color:var(--gold);}
  #gaPill{color:#ffe9a8; cursor:help;}
  #hpWrap{flex:1; max-width:250px; pointer-events:auto;}
  #hpBarOuter{height:15px; border-radius:999px; background:#00000088; border:1px solid #ffffff22; overflow:hidden;}
  #hpBarInner{height:100%; width:100%; border-radius:999px; background:linear-gradient(90deg,#7fce4d,#b9e25a);
    transition:width .25s ease; box-shadow:0 0 12px #a4e05a88 inset;}
  #hpBarInner.low{background:linear-gradient(90deg,#e5533d,#ff8a5b);}
  #hpText{font-size:10.5px; text-align:center; margin-top:2px; opacity:.85; letter-spacing:.5px;}
  .iconbtn{pointer-events:auto; cursor:pointer; background:#00000066; border:1px solid #ffffff1c; color:var(--cream);
    border-radius:10px; padding:5px 9px; font-size:12.5px; font-weight:700; transition:.15s; white-space:nowrap;}
  .iconbtn:hover{background:#ffffff22; transform:translateY(-1px);}
  .iconbtn:active{transform:scale(.95);}
  .iconbtn.danger:hover{background:#e5533d55; border-color:#e5533d;}

  #bottombar{bottom:0; left:0; right:0; display:flex; align-items:flex-end; gap:5px; padding:8px 8px;
    background:linear-gradient(0deg,#101708f2, #10170800);}
  #palette{display:flex; gap:4px; flex-wrap:nowrap;}
  .tcard{pointer-events:auto; cursor:pointer; width:56px; padding:4px 2px 3px; text-align:center; border-radius:10px;
    background:linear-gradient(180deg, var(--panel2), #1b2713); border:2px solid #ffffff1f; transition:.13s; position:relative;}
  .tcard:hover{transform:translateY(-5px) scale(1.05); border-color:var(--gold); box-shadow:0 8px 20px #000a, 0 0 16px #ffc94d33; z-index:3;}
  .tcard.sel{border-color:var(--gold); box-shadow:0 0 0 2px var(--gold), 0 0 22px #ffc94d55; transform:translateY(-5px);}
  .tcard.off{opacity:.42; filter:grayscale(.7); cursor:not-allowed;}
  .tcard .tico{font-size:18px; line-height:1.1; filter:drop-shadow(0 3px 3px #0008);}
  .tcard .tname{font-size:7.5px; font-weight:800; letter-spacing:.1px; margin-top:1px; line-height:1.15; min-height:17px;
    display:flex; align-items:center; justify-content:center;}
  .tcard .tcost{font-size:9.5px; color:var(--gold); font-weight:800;}
  .tcard .tkey{position:absolute; top:2px; left:4px; font-size:8px; opacity:.55;}
  .tcard .tlock{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:18px;}

  #waveBtn{pointer-events:auto; cursor:pointer; margin-left:auto; padding:9px 12px; font-size:13.5px; font-weight:900;
    letter-spacing:.5px; color:#3a2405; border:none; border-radius:12px;
    background:linear-gradient(180deg,var(--gold),var(--gold2)); box-shadow:0 4px 0 #9c6510, 0 8px 24px #000a;
    transition:.12s; animation:pulse 1.6s infinite; white-space:nowrap;}
  #waveBtn:hover{transform:translateY(-2px); filter:brightness(1.08);}
  #waveBtn:active{transform:translateY(2px); box-shadow:0 2px 0 #9c6510;}
  #waveBtn:disabled{animation:none; opacity:.45; cursor:default; filter:grayscale(.4);}
  @keyframes pulse{0%,100%{box-shadow:0 4px 0 #9c6510, 0 8px 24px #000a, 0 0 0px #ffc94d00;}
    50%{box-shadow:0 4px 0 #9c6510, 0 8px 24px #000a, 0 0 26px #ffc94d66;}}

  /* speed segmented control */
  #speedCtl{pointer-events:auto; display:flex; border:1px solid #ffffff28; border-radius:11px; overflow:hidden;
    background:#00000066; margin-left:6px;}
  #speedCtl button{border:none; background:transparent; color:var(--cream); padding:8px 7px; font-size:12px;
    font-weight:800; cursor:pointer; transition:.12s; border-right:1px solid #ffffff14;}
  #speedCtl button:last-child{border-right:none;}
  #speedCtl button:hover{background:#ffffff1c;}
  #speedCtl button.on{background:linear-gradient(180deg,var(--gold),var(--gold2)); color:#3a2405;}
  #speedCtl button.pauseOn{background:linear-gradient(180deg,#e5806b,#c95a3d); color:#fff;}

  /* ---------- tower panel ---------- */
  #towerPanel{position:absolute; right:10px; bottom:86px; width:212px; z-index:6; background:var(--panel);
    border:1px solid #ffffff26; border-radius:14px; padding:11px 12px; backdrop-filter:blur(6px);
    box-shadow:var(--shadow); display:none; pointer-events:auto;}
  #towerPanel h3{font-size:13.5px; color:var(--gold); display:flex; justify-content:space-between; align-items:center;}
  #towerPanel .lvltag{color:#dff0bd; font-size:11px;}
  #towerPanel .stat{display:flex; justify-content:space-between; font-size:11.5px; padding:1.5px 0; opacity:.92;}
  #towerPanel .stat b{color:#d7f0b2;}
  .xpOuter{height:8px; border-radius:99px; background:#00000077; border:1px solid #ffffff20; overflow:hidden; margin:6px 0 2px;}
  .xpInner{height:100%; background:linear-gradient(90deg,#5ab4e5,#8fd8ff); border-radius:99px;}
  .xpTxt{font-size:9.5px; opacity:.7; text-align:center; margin-bottom:2px;}
  .pbtn{width:100%; margin-top:6px; padding:7px; border:none; border-radius:9px; font-weight:800; font-size:12px;
    cursor:pointer; transition:.12s; color:#26350f;}
  .pbtn:hover{filter:brightness(1.1); transform:translateY(-1px);}
  .pbtn:disabled{opacity:.4; cursor:default;}
  #upgBtn,.upgAllBtn{background:linear-gradient(180deg,#b9e25a,#7fb63a);}
  #sellBtn,.sellAllBtn{background:linear-gradient(180deg,#f0a26b,#d4713a); color:#3a1a05;}
  .specBtn{background:linear-gradient(180deg,#c77dff,#9a4fd8); color:#fff; font-size:11px; line-height:1.25; padding:6px;}
  .specHead{font-size:10.5px; color:var(--epic); font-weight:900; margin-top:8px; letter-spacing:.5px;}
  .specTag{display:inline-block; font-size:9.5px; background:#c77dff33; color:#e3c2ff; border-radius:6px; padding:1px 7px; margin-top:3px;}

  /* ---------- perk panel ---------- */
  #perkPanel{position:absolute; left:10px; top:44px; width:236px; z-index:7; background:var(--panel);
    border:1px solid #ffffff26; border-radius:14px; padding:11px 13px; backdrop-filter:blur(6px);
    box-shadow:var(--shadow); display:none; pointer-events:auto; max-height:70%; overflow-y:auto;}
  #perkPanel h3{font-size:13px; color:var(--gold); margin-bottom:6px;}
  #perkPanel .picons{display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px;}
  #perkPanel .pstack{background:#00000055; border:1px solid #ffffff22; border-radius:8px; padding:2px 6px;
    font-size:13px; display:flex; align-items:center; gap:2px;}
  #perkPanel .pstack .n{font-size:10px; font-weight:900; color:var(--gold);}
  #perkPanel .effline{display:flex; justify-content:space-between; gap:8px; font-size:11.5px; padding:2.5px 0;
    border-bottom:1px solid #ffffff0d;}
  #perkPanel .effline b{color:#d7f0b2; white-space:nowrap;}
  #perkPanel .effuniq{color:#e3c2ff;}
  #perkPanel .pempty{font-size:11.5px; opacity:.7; line-height:1.5;}

  /* ---------- modals ---------- */
  #modalLayer{position:absolute; inset:0; z-index:20; display:none; align-items:center; justify-content:center;
    background:#0a0f06cc; backdrop-filter:blur(3px);}
  #modalLayer.show{display:flex; animation:fadeIn .25s;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal{background:linear-gradient(180deg,#2b3c1d,#1a2611); border:1px solid #ffffff2b; border-radius:20px;
    padding:24px 28px; max-width:88%; max-height:90%; overflow-y:auto; box-shadow:var(--shadow), 0 0 60px #7fb63a22;
    text-align:center; animation:pop .3s cubic-bezier(.2,1.6,.4,1);}
  @keyframes pop{from{transform:scale(.85); opacity:0;} to{transform:scale(1); opacity:1;}}
  .modal h1{font-size:32px; letter-spacing:1px; margin-bottom:4px; color:var(--gold);
    text-shadow:0 3px 0 #00000066, 0 0 30px #ffc94d44;}
  .modal h2{font-size:21px; color:var(--gold); margin-bottom:8px; text-shadow:0 2px 0 #0006;}
  .modal .sub{opacity:.85; font-size:13.5px; margin-bottom:14px;}
  .bigbtn{display:inline-block; margin:5px; padding:12px 26px; font-size:16px; font-weight:900; letter-spacing:.5px;
    border:none; border-radius:14px; cursor:pointer; color:#3a2405; transition:.13s;
    background:linear-gradient(180deg,var(--gold),var(--gold2)); box-shadow:0 5px 0 #9c6510, 0 8px 20px #0009;}
  .bigbtn:hover{transform:translateY(-2px); filter:brightness(1.08);}
  .bigbtn:active{transform:translateY(2px); box-shadow:0 2px 0 #9c6510;}
  .bigbtn.alt{background:linear-gradient(180deg,#a8cf6d,#6f9c3c); box-shadow:0 5px 0 #47661f, 0 8px 20px #0009; color:#1e2b0c;}
  .bigbtn.ghost{background:#ffffff14; color:var(--cream); box-shadow:0 5px 0 #00000055;}
  .btnnote{display:block; font-size:10px; font-weight:600; opacity:.75; margin-top:2px; letter-spacing:0;}

  /* perk cards */
  #perkRow{display:flex; gap:13px; justify-content:center; flex-wrap:wrap; margin:8px 0 12px;}
  .perk{width:160px; padding:15px 11px 13px; border-radius:16px; cursor:pointer; position:relative;
    background:linear-gradient(180deg,#33461f,#222f15); border:2px solid var(--rc); transition:.15s;
    box-shadow:0 6px 18px #0009;}
  .perk:hover{transform:translateY(-7px) scale(1.045); box-shadow:0 14px 30px #000b, 0 0 26px var(--rc);}
  .perk .pico{font-size:35px; filter:drop-shadow(0 4px 4px #0008);}
  .perk .pname{font-weight:900; font-size:14px; margin:6px 0 4px; color:var(--rc);}
  .perk .pdesc{font-size:11.5px; line-height:1.35; opacity:.92;}
  .perk .prar{position:absolute; top:6px; right:8px; font-size:9px; font-weight:900; letter-spacing:1px;
    text-transform:uppercase; color:var(--rc); opacity:.9;}

  /* shop */
  #shopRow{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:10px 0 12px;}
  .shopItem{width:158px; padding:13px 10px 11px; border-radius:14px; position:relative;
    background:linear-gradient(180deg,#3a3020,#241d12); border:2px solid #ffc94d55; transition:.14s;}
  .shopItem .sico{font-size:31px; filter:drop-shadow(0 3px 3px #0008);}
  .shopItem .sname{font-weight:900; font-size:13px; margin:5px 0 3px; color:var(--gold);}
  .shopItem .sdesc{font-size:11px; line-height:1.3; opacity:.9; min-height:42px;}
  .shopItem button{margin-top:6px; padding:6px 16px; border:none; border-radius:9px; font-weight:900; font-size:12px;
    cursor:pointer; background:linear-gradient(180deg,var(--gold),var(--gold2)); color:#3a2405; transition:.12s;}
  .shopItem button:hover{filter:brightness(1.12); transform:translateY(-1px);}
  .shopItem button:disabled{opacity:.35; cursor:default; filter:grayscale(.6);}
  .shopItem.bought{opacity:.45; border-color:#ffffff22;}
  .shopItem.bought::after{content:"✓ BOUGHT"; position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; font-weight:900; color:#b9e25a; font-size:15px; background:#00000066; border-radius:12px;}

  /* prestige grove */
  #groveGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(172px,1fr)); gap:11px; margin:12px 0;
    max-width:820px;}
  .gnode{background:linear-gradient(180deg,#33461f,#212d14); border:1.5px solid #ffffff26; border-radius:14px;
    padding:11px 9px; text-align:center; transition:.13s;}
  .gnode:hover{border-color:var(--gold); transform:translateY(-2px);}
  .gnode .gico{font-size:24px;}
  .gnode .gname{font-weight:900; font-size:12.5px; margin:3px 0 2px; color:#dff0bd;}
  .gnode .gdesc{font-size:10.5px; opacity:.85; line-height:1.3; min-height:28px;}
  .gnode .gpips{margin:5px 0 3px; letter-spacing:2px; font-size:10px;}
  .gnode .gpips .on{color:var(--gold);} .gnode .gpips .offp{color:#ffffff2e;}
  .gbuy{margin-top:3px; padding:6px 13px; border:none; border-radius:9px; font-weight:900; font-size:11.5px;
    cursor:pointer; background:linear-gradient(180deg,var(--gold),var(--gold2)); color:#3a2405; transition:.12s;}
  .gbuy:hover{filter:brightness(1.1);} .gbuy:disabled{opacity:.35; cursor:default; filter:grayscale(.6);}
  .gnode.maxed{border-color:var(--gold); box-shadow:0 0 14px #ffc94d33;}

  /* achievements */
  #achGrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:10px; margin:12px 0;
    max-width:760px; text-align:left;}
  .achCard{display:flex; gap:10px; align-items:center; background:#00000033; border:1.5px solid #ffffff1c;
    border-radius:12px; padding:9px 11px;}
  .achCard.got{border-color:var(--gold); background:linear-gradient(180deg,#3a3420,#242012); box-shadow:0 0 12px #ffc94d22;}
  .achCard .aico{font-size:24px; filter:grayscale(1) opacity(.4);}
  .achCard.got .aico{filter:none;}
  .achCard .aname{font-weight:900; font-size:12px; color:#dff0bd;}
  .achCard.got .aname{color:var(--gold);}
  .achCard .adesc{font-size:10.5px; opacity:.8; line-height:1.25;}
  .achCard .aga{font-size:10px; color:var(--gold); font-weight:800;}

  /* achievement toast */
  #toastZone{position:absolute; top:64px; right:12px; z-index:30; display:flex; flex-direction:column; gap:8px;
    pointer-events:none;}
  .toast{display:flex; gap:10px; align-items:center; background:linear-gradient(180deg,#3a3420,#242012);
    border:1.5px solid var(--gold); border-radius:12px; padding:10px 14px; box-shadow:0 8px 24px #000b, 0 0 20px #ffc94d33;
    animation:toastIn .4s cubic-bezier(.2,1.6,.4,1), toastOut .4s ease 3.6s forwards;}
  @keyframes toastIn{from{transform:translateX(120%); opacity:0;} to{transform:none; opacity:1;}}
  @keyframes toastOut{to{transform:translateX(120%); opacity:0;}}
  .toast .tico2{font-size:26px;}
  .toast .tt1{font-size:10px; letter-spacing:1.5px; color:var(--gold); font-weight:900;}
  .toast .tt2{font-size:13px; font-weight:800;}
  .toast .tt3{font-size:11px; color:var(--gold);}

  /* title */
  #title-logo{font-size:54px; font-weight:900; letter-spacing:3px; line-height:1;
    background:linear-gradient(180deg,#ffe9a8,#ffaa2b 60%,#c97a17); -webkit-background-clip:text; background-clip:text;
    color:transparent; filter:drop-shadow(0 4px 0 #00000088) drop-shadow(0 0 34px #ffc94d33); margin-bottom:2px;}
  #title-sub{font-size:14px; letter-spacing:4px; text-transform:uppercase; color:#b9d68f; opacity:.9; margin-bottom:18px;}
  .statline{display:flex; gap:20px; justify-content:center; font-size:12.5px; opacity:.9; margin:10px 0 6px; flex-wrap:wrap;}
  .statline b{color:var(--gold);}
  .gaBreakdown{display:inline-block; text-align:left; font-size:12.5px; background:#00000033; border:1px solid #ffffff1a;
    border-radius:12px; padding:10px 18px; margin:8px 0; line-height:1.7;}
  .gaBreakdown b{color:var(--gold);}

  /* misc */
  #waveBanner{position:absolute; top:38%; left:0; right:0; text-align:center; z-index:8; pointer-events:none;
    font-size:42px; font-weight:900; letter-spacing:2px; color:var(--gold); opacity:0;
    text-shadow:0 4px 0 #00000088, 0 0 40px #ffc94d66;}
  #waveBanner.go{animation:banner 1.8s ease forwards;}
  @keyframes banner{0%{opacity:0; transform:scale(.6);} 15%{opacity:1; transform:scale(1.08);}
    28%{transform:scale(1);} 75%{opacity:1;} 100%{opacity:0; transform:scale(1.05) translateY(-14px);}}
  #pausedBadge{position:absolute; top:30%; left:0; right:0; text-align:center; z-index:8; pointer-events:none;
    font-size:34px; font-weight:900; letter-spacing:6px; color:#fff; text-shadow:0 3px 0 #000a; display:none;}
  #wavePreview{position:absolute; top:46px; left:50%; transform:translateX(-50%); z-index:5; pointer-events:none;
    background:#00000077; border:1px solid #ffffff1f; border-radius:999px; padding:5px 16px; font-size:13px;
    backdrop-filter:blur(4px); white-space:nowrap;}
  .hint{font-size:11px; opacity:.6; margin-top:8px; line-height:1.5;}
  .rerollbtn{background:#ffffff16; border:1px solid #ffffff30; color:var(--cream); border-radius:10px;
    padding:8px 18px; font-weight:800; cursor:pointer; font-size:13px;}
  .rerollbtn:hover{background:#ffffff28;}
  .rerollbtn:disabled{opacity:.35; cursor:default;}
  ::-webkit-scrollbar{width:9px;} ::-webkit-scrollbar-thumb{background:#5a8f2988; border-radius:9px;}
</style>
</head>
<body>
<div id="app">
  <div id="game-wrap">
    <canvas id="game" width="960" height="600"></canvas>

    <div class="hud" id="topbar">
      <div class="pill" id="goldPill" title="Acorns — spend on towers, upgrades and the shop. Leftovers convert to Golden Acorns (200:1) when the run ends."><span class="ico">🌰</span><span id="goldTxt">0</span></div>
      <div class="pill" id="lvlPill">🗺️ <span id="lvlTxt">1</span> · Wave <span id="waveTxt">1</span></div>
      <div class="pill" id="perkPill" title="Your perks — click to see active bonuses" style="cursor:pointer;">🎁 <span id="perkCount">0</span></div>
      <div id="hpWrap">
        <div id="hpBarOuter"><div id="hpBarInner"></div></div>
        <div id="hpText">GREAT OAK 20/20</div>
      </div>
      <div class="pill" id="gaPill" title="Golden Acorns (prestige currency). Earned: +1 per wave cleared, +4 per forest cleared, +30 for winning, +1 per 200 leftover acorns, plus achievement rewards. Spend in The Grove for permanent upgrades."><span class="ico">✨</span><span id="gaTxt">0</span></div>
      <button class="iconbtn" id="helpBtn" title="How to play">❓</button>
      <button class="iconbtn" id="muteBtn" title="Toggle sound">🔊</button>
      <button class="iconbtn danger" id="quitBtn" title="Give up this run — you keep all Golden Acorns earned so far">🏳️ Retreat</button>
    </div>

    <div id="wavePreview" style="display:none;"></div>
    <div id="waveBanner"></div>
    <div id="pausedBadge">⏸ PAUSED</div>
    <div id="toastZone"></div>

    <div class="hud" id="bottombar">
      <div id="palette"></div>
      <button id="waveBtn">🐿️ START</button>
      <div id="speedCtl">
        <button id="spPause" title="Pause (P)">⏸</button>
        <button id="sp1" class="on" title="Normal speed">1×</button>
        <button id="sp2" title="Double speed">2×</button>
        <button id="sp3" title="Triple speed">3×</button>
      </div>
    </div>

    <div id="towerPanel"></div>
    <div id="perkPanel"></div>
    <div id="modalLayer"><div class="modal" id="modalBox"></div></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/game.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
